name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Fetch Glyph Matrix SDK
        run: |
          mkdir -p app/libs
          curl -sL -o app/libs/glyph-matrix-sdk-2.0.aar \
            https://raw.githubusercontent.com/Nothing-Developer-Programme/GlyphMatrix-Developer-Kit/main/glyph-matrix-sdk-2.0.aar
          ls -la app/libs

      - name: Decode pinned debug keystore
        run: base64 -d debug.keystore.b64 > app/debug.keystore

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Rename APK with run number
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/GlyphTorchToy-${{ github.run_number }}.apk

      - name: Create release with APK attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/GlyphTorchToy-${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

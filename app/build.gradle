plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dotstaraj.glyphtorchtoy'
    compileSdk 35

    defaultConfig {
        applicationId "com.dotstaraj.glyphtorchtoy"
        // The Glyph Matrix SDK aar itself declares minSdkVersion 33 (Android 13) in its
        // own manifest — confirmed by extracting AndroidManifest.xml from the aar directly.
        // Setting this any lower will fail at manifest-merge time.
        minSdk 33
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            // Fixed debug keystore checked into the repo (as debug.keystore.b64,
            // decoded by CI before building — see .github/workflows/build.yml).
            // Without this, Gradle falls back to each machine's own
            // auto-generated ~/.android/debug.keystore, which is different on
            // every fresh CI runner and every local machine. That means every
            // build gets a different signing certificate, and Android refuses
            // to install a new APK over an existing one signed with a
            // different certificate ("app not installed as package conflicts
            // with an existing package"). Pinning one fixed keystore here
            // makes every build — CI or local — share the same identity, so
            // updates actually install as updates instead of conflicting.
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Official Glyph Matrix SDK, downloaded directly from
    // Nothing-Developer-Programme/GlyphMatrix-Developer-Kit on GitHub.
    // This is the app's only dependency — no AndroidX, no UI libraries.
    implementation files('libs/glyph-matrix-sdk-2.0.aar')
}

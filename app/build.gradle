plugins {
    id 'com.android.application'
}

// The debug keystore is committed at the repo root as debug.keystore.b64 so
// every build shares one signing certificate: CI decodes it in a workflow
// step, and this task decodes it too so local Android Studio builds match
// it automatically as well, with no manual step. Without this, Android
// Gradle Plugin falls back to each machine's own auto-generated
// ~/.android/debug.keystore, which differs per machine and per fresh CI
// runner. Different certs mean Android refuses to install a new APK over
// an existing one ("app not installed as package conflicts with an
// existing package") even though the package name is identical.
tasks.register('decodeDebugKeystore') {
    def b64File = rootProject.file('debug.keystore.b64')
    def outFile = file('debug.keystore')
    onlyIf { b64File.exists() }
    doLast {
        outFile.bytes = Base64.decoder.decode(b64File.text.trim())
    }
}

android {
    namespace 'com.dotstaraj.glyphtorchtoy'
    compileSdk 35

    defaultConfig {
        applicationId "com.dotstaraj.glyphtorchtoy"
        // The Glyph Matrix SDK aar itself declares minSdkVersion 33 (Android 13) in its
        // own manifest — confirmed by extracting AndroidManifest.xml from the aar directly.
        // Setting this any lower will fail at manifest-merge time.
        minSdk 33
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            // Fixed debug keystore — see decodeDebugKeystore task above for
            // why, and how it gets here on both CI and local builds.
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

tasks.named('preBuild').configure {
    dependsOn('decodeDebugKeystore')
}

dependencies {
    // Official Glyph Matrix SDK, downloaded directly from
    // Nothing-Developer-Programme/GlyphMatrix-Developer-Kit on GitHub.
    // This is the app's only dependency — no AndroidX, no UI libraries.
    implementation files('libs/glyph-matrix-sdk-2.0.aar')
}
